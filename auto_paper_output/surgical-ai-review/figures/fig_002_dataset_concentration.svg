<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dataset Concentration and Long-Tail Bias in Surgical AI</title>
  <desc id="desc">Four-panel conceptual planning figure for dataset concentration. Panels A, C, and D are marked USER_GATE because dataset metadata coding is required.</desc>
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#17212b}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#56616d}
      .panelTitle{font-family:Arial,Helvetica,sans-serif;font-size:21px;font-weight:700;fill:#17212b}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#46515d}
      .gate{font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:700;fill:#6b4e00}
      .axis{stroke:#263746;stroke-width:2}
      .grid{stroke:#d9dee5;stroke-width:1;stroke-dasharray:5 7}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="56" text-anchor="middle" class="title">Dataset Concentration and Long-Tail Bias</text>
  <text x="800" y="86" text-anchor="middle" class="subtitle">Empirical panels require dataset metadata coding</text>

  <rect x="70" y="125" width="700" height="330" rx="16" fill="#fbfcfe" stroke="#d7dde6" stroke-width="2"/>
  <text x="100" y="165" class="panelTitle">A. Dataset geography (USER_GATE)</text>
  <path d="M170 285 C230 215 330 205 420 245 C520 210 650 230 685 300 C625 365 495 355 430 330 C345 370 230 360 170 285Z" fill="#e8eef4" stroke="#9aa8b7" stroke-width="2"/>
  <circle cx="330" cy="265" r="13" fill="#497eac" opacity="0.82"/>
  <circle cx="470" cy="275" r="10" fill="#497eac" opacity="0.72"/>
  <circle cx="565" cy="310" r="8" fill="#497eac" opacity="0.62"/>
  <rect x="545" y="365" width="180" height="44" rx="9" fill="#fff7d7" stroke="#e2b84c"/>
  <text x="635" y="392" text-anchor="middle" class="gate">USER_GATE</text>

  <rect x="830" y="125" width="700" height="330" rx="16" fill="#fbfcfe" stroke="#d7dde6" stroke-width="2"/>
  <text x="860" y="165" class="panelTitle">B. Procedure concentration</text>
  <line x1="900" y1="390" x2="1465" y2="390" class="axis"/>
  <line x1="900" y1="390" x2="900" y2="205" class="axis"/>
  <rect x="930" y="235" width="46" height="155" fill="#426a8c"/>
  <rect x="1002" y="305" width="46" height="85" fill="#7da0be"/>
  <rect x="1074" y="330" width="46" height="60" fill="#9fb7cc"/>
  <rect x="1146" y="350" width="46" height="40" fill="#b9c8d6"/>
  <rect x="1218" y="365" width="46" height="25" fill="#ccd6df"/>
  <rect x="1290" y="374" width="46" height="16" fill="#d8e0e7"/>
  <rect x="1362" y="380" width="46" height="10" fill="#e2e8ee"/>
  <text x="953" y="416" text-anchor="middle" class="label">LC</text>
  <text x="1146" y="416" text-anchor="middle" class="label">other high-frequency tasks</text>
  <text x="1362" y="416" text-anchor="middle" class="label">long tail</text>

  <rect x="70" y="500" width="700" height="330" rx="16" fill="#fbfcfe" stroke="#d7dde6" stroke-width="2"/>
  <text x="100" y="540" class="panelTitle">C. Scale vs center diversity (USER_GATE)</text>
  <line x1="135" y1="775" x2="705" y2="775" class="axis"/>
  <line x1="135" y1="775" x2="135" y2="585" class="axis"/>
  <text x="420" y="815" text-anchor="middle" class="label">videos</text>
  <text x="92" y="690" text-anchor="middle" transform="rotate(-90 92 690)" class="label">institutions</text>
  <circle cx="255" cy="710" r="34" fill="#7ea6c8" opacity="0.55" stroke="#426a8c" stroke-width="2"/>
  <circle cx="430" cy="690" r="52" fill="#97c8a5" opacity="0.50" stroke="#4c8a5d" stroke-width="2"/>
  <circle cx="590" cy="620" r="24" fill="#d7a08a" opacity="0.55" stroke="#a55a43" stroke-width="2"/>
  <rect x="545" y="730" width="180" height="44" rx="9" fill="#fff7d7" stroke="#e2b84c"/>
  <text x="635" y="757" text-anchor="middle" class="gate">USER_GATE</text>

  <rect x="830" y="500" width="700" height="330" rx="16" fill="#fbfcfe" stroke="#d7dde6" stroke-width="2"/>
  <text x="860" y="540" class="panelTitle">D. Dataset diversity (USER_GATE)</text>
  <g transform="translate(1180,674)">
    <circle r="105" fill="none" stroke="#d9dee5"/>
    <circle r="70" fill="none" stroke="#d9dee5"/>
    <circle r="35" fill="none" stroke="#d9dee5"/>
    <line x1="0" y1="-115" x2="0" y2="115" stroke="#d9dee5"/>
    <line x1="-100" y1="-58" x2="100" y2="58" stroke="#d9dee5"/>
    <line x1="-100" y1="58" x2="100" y2="-58" stroke="#d9dee5"/>
    <polygon points="0,-85 62,-36 70,40 0,52 -55,32 -48,-28" fill="#8f70c8" opacity="0.30" stroke="#6e52a6" stroke-width="3"/>
    <text x="0" y="-130" text-anchor="middle" class="label">procedure</text>
    <text x="128" y="-65" text-anchor="middle" class="label">device</text>
    <text x="126" y="78" text-anchor="middle" class="label">geography</text>
    <text x="0" y="145" text-anchor="middle" class="label">outcomes</text>
    <text x="-126" y="78" text-anchor="middle" class="label">validation</text>
    <text x="-128" y="-65" text-anchor="middle" class="label">annotation</text>
  </g>
  <rect x="1345" y="730" width="150" height="44" rx="9" fill="#fff7d7" stroke="#e2b84c"/>
  <text x="1420" y="757" text-anchor="middle" class="gate">USER_GATE</text>
</svg>
