<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>surgical-ai-review figure drafts</title>
  <style>
    body {
      margin: 0;
      background: #f4f6f8;
      color: #17212b;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 48px));
      margin: 32px auto 56px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 20px;
    }
    section {
      margin: 0 0 32px;
      background: #fff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 18px;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid #e1e6ee;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1>surgical-ai-review figure drafts</h1>
    <section>
      <h2>Figure 1: Clinical Value-Cost Landscape</h2>
      <img src="fig_001_value_cost_landscape.svg" alt="Figure 1 value-cost landscape">
    </section>
    <section>
      <h2>Figure 2: Dataset Concentration and Long-Tail Bias</h2>
      <img src="fig_002_dataset_concentration.svg" alt="Figure 2 dataset concentration">
    </section>
    <section>
      <h2>Figure 3: Layer-wise Research Landscape</h2>
      <img src="fig_003_layered_spatial_world_models.svg" alt="Figure 3 layered spatial world models">
    </section>
    <section>
      <h2>Figure 4: Three-Lane Roadmap</h2>
      <img src="fig_004_three_lane_roadmap.svg" alt="Figure 4 three-lane roadmap">
    </section>
  </main>
</body>
</html>
