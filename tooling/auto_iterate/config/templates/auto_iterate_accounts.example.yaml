# Auto-Iterate Account Registry
# Defines Codex accounts available to the controller.
# Each account has its own CODEX_HOME directory with separate auth credentials.
# The controller selects accounts per-phase via CODEX_HOME environment variable.

accounts:
  - id: codex_acc1
    codex_home: /home/user/.codex-acc1
    enabled: true
    priority: 100          # Higher = preferred
    cooldown_sec: 1800     # 30 min cooldown after quota/rate-limit
    tags: [local, primary]

  - id: codex_acc2
    codex_home: /home/user/.codex-acc2
    enabled: true
    priority: 90
    cooldown_sec: 1800
    tags: [local, backup]

# --- Optional fields (not used by V1 core logic) ---
#   max_calls_hint: 1000   # Informational; not enforced by controller
#   notes: "Personal account, lower rate limits"
#   provider: openai
#   base_url: https://api.openai.com/v1
