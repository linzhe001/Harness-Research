# Auto-Iterate Account Registry
# This checked-in file is an intentionally empty shared default.
#
# Generate a live machine-local registry from Cockpit-managed Codex accounts
# before unattended WF10 runs:
#
#   tooling/auto_iterate/scripts/project_cockpit_codex_accounts.py \
#     --accounts-yaml tooling/auto_iterate/config/accounts.local.yaml
#
# The generated file will contain machine-specific CODEX_HOME projection paths
# under ~/.cache/auto_iterate/codex/. Review those local paths before sharing
# changes back to the harness repo.

accounts: []
