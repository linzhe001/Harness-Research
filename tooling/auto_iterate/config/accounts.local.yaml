# Auto-Iterate Account Registry
# This checked-in file uses external current-auth mode by default.
#
# Windows Cockpit owns Codex account switching. In WSL, keep
# ~/.codex/auth.json linked to the Cockpit-managed Windows auth file. The
# controller only starts fresh `codex exec` processes and retries the current
# phase after quota/auth failures.

mode: external_current
id: external_current
codex_home: ~/.codex
